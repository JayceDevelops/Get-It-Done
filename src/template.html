<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Title</title>
</head>
<body>
    <nav>
        <div class="heading">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="50" height="50" fill="var(--bg-main)">
                <title>alpha-g-box</title>
                <path d="M11,7A2,2 0 0,0 9,9V15A2,2 0 0,0 11,17H13A2,2 0 0,0 15,15V11H13V15H11V9H15V7H11M5,3H19A2,2 0 0,1 21,5V19A2,2 0 0,1 19,21H5A2,2 0 0,1 3,19V5A2,2 0 0,1 5,3Z" />

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="25" height="25" fill="var(--urgent)">
                    <title>calendar-alert</title>
                        <path d="M6 1V3H5C3.89 3 3 3.89 3 5V19C3 20.11 3.9 21 5 21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3H18V1H16V3H8V1H6M5 8H19V19H5V8M11 9V14H13V9H11M11 16V18H13V16H11Z" />
                    </svg>
                    <h1>Today</h1>
                </div>
                
                <div class="active">
                    <h1>Active</h1>
                </div>
            </div>
            <div class="presetButton upcoming">

            </div>
            <div class="presetButton anytime">

            </div>
            <div class="presetButton someday">

            </div>
        </div>
        
    </nav>
    <main>

    </main>
</body>
</html>
