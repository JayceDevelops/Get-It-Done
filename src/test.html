<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Title</title>
</head>
<body>
    <nav>
        <div class="heading">
            <img src="./assets/HeadIcon.svg" width="50" height="50">
            <h1>Get It Done</h1>
        </div>

        <button class="new">+ New Task</button>
        
        <div class="preset">
            <h1 class="list">Preset</h1>
            <div class="presetButton today current">
                <div class="presetname">
                    <img src="assets/TodayIcon.svg">
                    <h1>Today</h1>
                </div>
                
                <div class="active">
                    <h1>Current</h1>
                </div>
            </div>
            <div class="presetButton upcoming">
                <div class="presetname">
                    <img src="assets/UpcomingIcon.svg">
                    <h1>Upcoming</h1>
                </div>
            </div>
            <div class="presetButton anytime">
                <div class="presetname">
                    <img src="assets/AnytimeIcon.svg">
                    <h1>Anytime</h1>
                </div>
            </div>
            <div class="presetButton someday">
                <div class="presetname">
                    <img src="assets/SomedayIcon.svg">
                    <h1>Someday</h1>
                </div>
            </div>
        </div>
        <div class="custom">
            <div class="customHeader">
                <h1 class="list">Custom</h1>
                <div>
                    <button class="newCustom">+</button>
                </div>
            </div>
            

        </div>
    </nav>
    <main>

    </main>
</body>
</html>
